name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter 3.29.0
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
    
    - name: Fix Dart SDK PATH
      run: |
        echo "Current DART_HOME: $DART_HOME"
        echo "Current PATH: $PATH"
        # Add Flutter's Dart SDK to PATH explicitly
        export PATH="/opt/hostedtoolcache/flutter/3.29.0-x64/flutter/bin/cache/dart-sdk/bin:$PATH"
        echo "New PATH: $PATH"
        dart --version
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK release
      run: flutter build apk --release
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: petuno-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        tag_name: v1.0.${{ github.run_number }}
        name: Petuno Release v1.0.${{ github.run_number }}
        body: |
          APK generado automáticamente para Petuno
          - Build #${{ github.run_number }}
          - Commit: ${{ github.sha }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
